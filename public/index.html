<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Adam Executive Dashboard</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f4f6f9;

      margin: 0;

      padding: 20px;

    }

    h1 {

      margin-bottom: 10px;

    }

    .cards {

      display: flex;

      gap: 15px;

      margin-bottom: 20px;

      flex-wrap: wrap;

    }

    .card {

      background: white;

      padding: 20px;

      border-radius: 10px;

      min-width: 180px;

      box-shadow: 0 2px 6px rgba(0,0,0,0.1);

    }

    .card h2 {

      margin: 0;

      font-size: 28px;

    }

    table {

      width: 100%;

      border-collapse: collapse;

      background: white;

      border-radius: 10px;

      overflow: hidden;

    }

    th, td {

      padding: 14px;

      border-bottom: 1px solid #ddd;

      text-align: left;

    }

    th {

      background: #111827;

      color: white;

    }

    .high {

      color: red;

      font-weight: bold;

    }

    .medium {

      color: orange;

      font-weight: bold;

    }

    .low {

      color: green;

      font-weight: bold;

    }

  </style>

</head>

<body>

  <h1>Adam Executive Dashboard</h1>

  <p>AI Executive Assistant for Media Production Management</p>

  <div class="cards">

    <div class="card">

      <p>Total Tasks</p>

      <h2 id="totalTasks">0</h2>

    </div>

    <div class="card">

      <p>High Priority</p>

      <h2 id="highTasks">0</h2>

    </div>

    <div class="card">

      <p>Completed</p>

      <h2 id="completedTasks">0</h2>

    </div>

  </div>

  <table>

    <thead>

      <tr>

        <th>Task</th>

        <th>Status</th>

        <th>Priority</th>

      </tr>

    </thead>

    <tbody id="taskTable">

    </tbody>

  </table>

  <script>

    async function loadTasks() {

      try {

        const response = await fetch('/api/tasks');

        const tasks = await response.json();

        document.getElementById('totalTasks').innerText = tasks.length;

        const highPriority = tasks.filter(

          t => t.priority?.toLowerCase() === 'high'

        );

        document.getElementById('highTasks').innerText =

          highPriority.length;

        const completed = tasks.filter(

          t => t.status?.toLowerCase() === 'completed'

        );

        document.getElementById('completedTasks').innerText =

          completed.length;

        const table = document.getElementById('taskTable');

        table.innerHTML = '';

        tasks.forEach(task => {

          const row = document.createElement('tr');

          row.innerHTML = `

            <td>${task.title || '-'}</td>

            <td>${task.status || 'pending'}</td>

            <td class="${(task.priority || '').toLowerCase()}">

              ${task.priority || '-'}

            </td>

          `;

          table.appendChild(row);

        });

      } catch (error) {

        console.error(error);

      }

    }

    loadTasks();

  </script>

</body>

</html>
