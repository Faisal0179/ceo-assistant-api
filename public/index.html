<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adam Executive Dashboard</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:20px;
    }

    h1{
      margin-bottom:5px;
    }

    .cards{
      display:flex;
      gap:15px;
      margin:20px 0;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      min-width:180px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2{
      margin:0;
      font-size:32px;
    }

    .panel{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    input, select, button{
      padding:10px;
      margin:5px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:14px;
    }

    button{
      background:#111827;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .delete-btn{
      background:#b91c1c;
    }

    .complete-btn{
      background:#166534;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:10px;
      overflow:hidden;
    }

    th, td{
      padding:14px;
      border-bottom:1px solid #ddd;
      text-align:left;
    }

    th{
      background:#111827;
      color:white;
    }

    .high{
      color:red;
      font-weight:bold;
    }

    .medium{
      color:orange;
      font-weight:bold;
    }

    .low{
      color:green;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <h1>Adam Executive Dashboard</h1>
  <p>AI Executive Assistant for Media Production Management</p>

  <div class="cards">
    <div class="card">
      <p>Total Tasks</p>
      <h2 id="totalTasks">0</h2>
    </div>

    <div class="card">
      <p>High Priority</p>
      <h2 id="highTasks">0</h2>
    </div>

    <div class="card">
      <p>Completed</p>
      <h2 id="completedTasks">0</h2>
    </div>
  </div>

  <div class="panel">
    <h3>Add New Task</h3>

    <input type="text" id="title" placeholder="Task title">

    <select id="priority">
      <option value="High Priority">High Priority</option>
      <option value="Medium Priority">Medium Priority</option>
      <option value="Low Priority">Low Priority</option>
    </select>

    <select id="status">
      <option value="pending">pending</option>
      <option value="completed">completed</option>
    </select>

    <button id="addTaskBtn">Add Task</button>
    <button id="refreshBtn">Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Task</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="taskTable"></tbody>
  </table>

  <script>

    async function loadTasks() {

      const response = await fetch('/api/tasks');
      const tasks = await response.json();

      document.getElementById('totalTasks').innerText = tasks.length;

      const highTasks = tasks.filter(task =>
        (task.priority || '').toLowerCase().includes('high')
      );

      document.getElementById('highTasks').innerText = highTasks.length;

      const completedTasks = tasks.filter(task =>
        (task.status || '').toLowerCase() === 'completed'
      );
